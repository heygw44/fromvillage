name: "버그 리포트"
description: "버그를 발견했을 때 보고합니다."
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 리포트를 작성해주세요. 재현 방법을 구체적으로 작성하면 빠른 수정에 도움이 됩니다.

  - type: textarea
    id: summary
    attributes:
      label: 버그 요약
      description: 어떤 문제인지 한두 문장으로 요약해주세요.
      placeholder: "예: 주문 취소 시 재고가 복구되지 않음"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현할 수 있는 단계를 작성해주세요.
      placeholder: |
        1. POST /api/v1/orders 로 주문 생성
        2. POST /api/v1/orders/{id}/cancel 로 주문 취소
        3. GET /api/v1/products/{id} 로 상품 조회
        4. 재고가 원래 수량으로 복구되지 않음
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했을 때 어떻게 되어야 하는지 작성해주세요.
      placeholder: "예: 주문 취소 시 차감된 재고가 원래 수량으로 복구되어야 한다."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 현재 실제로 어떻게 동작하는지 작성해주세요.
      placeholder: "예: 주문 취소 후에도 재고가 차감된 상태로 유지된다."
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: 관련 모듈
      description: 버그가 발생한 모듈을 선택해주세요.
      options:
        - auth
        - user
        - product
        - cart
        - order
        - coupon
        - settlement
        - admin
        - common
        - 기타
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 에러 메시지
      description: 관련 로그나 에러 메시지가 있으면 붙여넣어주세요.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 스크린샷, 환경 정보 등 추가 정보가 있으면 작성해주세요.
    validations:
      required: false
